{% load static %}

<div class="modal-body p-5 text-center">
    <div class="mb-4">
        <div class="bg-rose-100 text-rose-600 rounded-full w-20 h-20 d-flex align-items-center justify-content-center mx-auto shadow-sm border border-rose-200">
            <i data-lucide="trash-2" ></i>
        </div>
    </div>
    
    <h3 class="font-weight-bold text-dark mb-2">Supprimer le Type de Cotation ?</h3>
    <p class=" mb-4 px-4">Êtes-vous sûr de vouloir supprimer le type <span class="text-dark font-weight-bold">"{{ object.name }}"</span> ? Cette action est irréversible et échouera si des cotations y sont liées.</p>

    <div class="d-flex align-items-center justify-content-center gap-3">
        <button type="button" class="btn btn-light font-weight-bold rounded-pill px-4 py-2 border w-100" data-dismiss="modal">
            Annuler
        </button>
        <form id="typeCotationDeleteModalForm" method="post" action="{% url 'typecotation_delete' object.id %}" class="w-100">
            {% csrf_token %}
            <button type="submit" class="btn btn-rose text-white font-weight-bold rounded-pill px-4 py-2 shadow-sm w-100" style="background: #e11d48;">
                Supprimer
            </button>
        </form>
    </div>
</div>

<script>
    if (typeof lucide !== 'undefined') {
        lucide.createIcons();
    }
</script>
