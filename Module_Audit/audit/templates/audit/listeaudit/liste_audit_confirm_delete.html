{% extends "base.html" %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm border-0 rounded-4">
                <div class="card-body p-5 text-center">
                    <div class="mb-4">
                        <i data-lucide="alert-triangle" class="text-warning w-12 h-12"></i>
                    </div>
                    <h2 class="fw-bold mb-3">Confirmer la suppression</h2>
                    <p class=" mb-4">
                        Êtes-vous sûr de vouloir supprimer l'audit <strong>"{{ object.desc }}"</strong> ? 
                        Cette action est irréversible.
                    </p>
                    <form method="post">
                        {% csrf_token %}
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-danger btn-lg rounded-3">
                                <i data-lucide="trash-2" class="me-2"></i>Oui, supprimer
                            </button>
                            <a href="{% url 'liste_audit_list' %}" class="btn btn-outline-secondary btn-lg rounded-3">
                                Annuler
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
