{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>Connexion - Audit d'entreprise</title> 
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="{% static 'adminlte/plugins/fontawesome-free/css/all.min.css' %}">
  <!-- Theme style -->
  <link rel="stylesheet" href="{% static 'adminlte/dist/css/adminlte.min.css' %}">
  <!-- Google Font: Inter -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
  
  <style>
    body {
        font-family: 'Inter', sans-serif;
        background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
        padding: 20px;
    }

    .login-box {
        width: 100%;
        max-width: 400px;
        margin: 0;
    }

    .login-logo {
        margin-bottom: 2rem;
        text-align: center;
    }

    .login-logo a {
        font-size: 2rem;
        font-weight: 800;
        color: #1e293b;
        letter-spacing: -0.025em;
        text-decoration: none;
    }

    .login-logo b {
        color: #3b82f6;
    }

    .card {
        border: none;
        border-radius: 1.5rem;
        box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        overflow: hidden;
    }

    .login-card-body {
        padding: 2.5rem 2rem;
    }

    .login-box-msg {
        font-size: 0.875rem;
        color: #64748b;
        font-weight: 500;
        margin-bottom: 2rem;
    }

    .input-group {
        position: relative;
        margin-bottom: 1.5rem;
    }

    .form-control {
        height: 3.5rem;
        border-radius: 0.75rem !important;
        border: 1px solid #e2e8f0;
        padding-left: 1rem;
        padding-right: 3rem;
        font-weight: 500;
        color: #1e293b;
        transition: all 0.2s ease;
    }

    .form-control:focus {
        border-color: #3b82f6;
        box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
    }

    .input-group-text {
        background: transparent;
        border: none;
        color: #94a3b8;
        padding-right: 1.25rem;
    }

    .btn-primary {
        background: #3b82f6;
        border: none;
        height: 3.5rem;
        border-radius: 0.75rem;
        font-weight: 700;
        font-size: 1rem;
        letter-spacing: 0.025em;
        box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.2), 0 2px 4px -1px rgba(59, 130, 246, 0.1);
        transition: all 0.2s ease;
    }

    .btn-primary:hover {
        background: #2563eb;
        transform: translateY(-1px);
        box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.3);
    }

    .btn-primary:active {
        transform: translateY(0);
    }

    .alert {
        border-radius: 0.75rem;
        font-size: 0.875rem;
        font-weight: 600;
        border: none;
        padding: 1rem;
        margin-bottom: 1.5rem;
    }

    @media (max-width: 480px) {
        .login-card-body {
            padding: 2rem 1.5rem;
        }
        
        .login-logo a {
            font-size: 1.75rem;
        }
    }
  </style>
</head>
<body class="hold-transition">
<div class="login-box">
  <div class="login-logo">
    <a href="#">
      <b>Audit</b>d'entreprise
    </a>
  </div>
  <div class="card">
    <div class="card-body login-card-body">
      <p class="login-box-msg">SYSTÈME DE GESTION DE TERRAIN</p>
      
      {% if error %}
        <div class="alert alert-danger shadow-sm">
          <i class="fas fa-exclamation-circle mr-2"></i> {{ error }}
        </div>
      {% endif %}

      <form method="post">
        {% csrf_token %}
        <div class="input-group">
          <input type="text" name="username" class="form-control" placeholder="Nom d'utilisateur ou Email" required autocomplete="username">
          <div class="input-group-append">
            <div class="input-group-text">
              <span class="fas fa-user"></span>
            </div>
          </div>
        </div>
        <div class="input-group">
          <input type="password" name="password" class="form-control" placeholder="Mot de passe" required autocomplete="current-password">
          <div class="input-group-append">
            <div class="input-group-text">
              <span class="fas fa-lock"></span>
            </div>
          </div>
        </div>
        <div class="row">
          <div class="col-12">
            <button type="submit" class="btn btn-primary btn-block">Se connecter</button>
          </div>        
        </div>
      </form>
    </div>
  </div>
</div>

<script src="{% static 'adminlte/plugins/jquery/jquery.min.js' %}"></script>
<script src="{% static 'adminlte/plugins/bootstrap/js/bootstrap.bundle.min.js' %}"></script>
<script src="{% static 'adminlte/dist/js/adminlte.min.js' %}"></script>

</body>
</html>
