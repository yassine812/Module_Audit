{% load static %}

<div class="modal-header border-bottom-0 pt-4 px-4">
    <div class="d-flex align-items-center gap-3">
        <div class="bg-red-100 text-red-600 p-2 rounded-lg" style="background-color: #fee2e2; color: #dc2626;">
            <i data-lucide="alert-triangle" ></i>
        </div>
        <div>
            <h4 class="modal-title font-weight-bold mb-0">Confirmer la suppression</h4>
            <p class="  mb-0">Cette action est irréversible.</p>
        </div>
    </div>
    <button type="button" class="close" data-dismiss="modal" aria-label="Close">
        <span aria-hidden="true">&times;</span>
    </button>
</div>

<div class="modal-body p-4 text-center">
    <div class="mb-4">
        <i data-lucide="trash-2" class=" mb-3 opacity-25" ></i>
        <p class="mb-0">Êtes-vous sûr de vouloir supprimer le chapitre suivant ?</p>
        <h5 class="font-weight-bold mt-2 text-dark">"{{ object.name }}"</h5>
        {% if object.text_ref %}
            <p class="  mt-1">(Norme: {{ object.text_ref.norme }})</p>
        {% endif %}
    </div>

    <div id="deleteErrorMessage" class="alert alert-danger rounded-xl mt-3 text-sm font-weight-bold" style="display: none;">
        <!-- Error message will be injected here via AJAX if needed -->
    </div>
</div>

<div class="modal-footer border-top-0 px-4 pb-4 bg-light d-flex justify-content-center">
    <button type="button" class="btn btn-white  font-weight-bold rounded-pill px-4" data-dismiss="modal">Annuler</button>
    <form id="deleteForm" method="post" action="{% url 'chapitre_delete' object.id %}">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger text-white font-weight-bold rounded-pill px-4 shadow-sm">
            <i data-lucide="trash-2" class="mr-2" ></i>
            Supprimer définitivement
        </button>
    </form>
</div>

<script>
    if (typeof lucide !== 'undefined') {
        lucide.createIcons();
    }
</script>
