{% load static %}

<form id="deleteForm" method="post" action="{% url 'critere_delete' object.id %}">
    {% csrf_token %}
    <div class="modal-header border-bottom-0 pt-4 px-4">
        <div class="d-flex align-items-center gap-3">
            <div class="bg-red-100 text-red-600 p-2 rounded-lg">
                <i data-lucide="alert-triangle" ></i>
            </div>
            <div>
                <h4 class="modal-title font-weight-bold mb-0">Supprimer le Critère</h4>
                <p class="  mb-0 text-truncate" style="max-width: 300px;">{{ object.name }}</p>
            </div>
        </div>
        <button type="button" class="close" data-dismiss="modal" aria-label="Close">
            <span aria-hidden="true">&times;</span>
        </button>
    </div>

    <div class="modal-body p-4">
        <div class="text-center mb-4">
            <p class="text-dark font-weight-bold">Êtes-vous sûr de vouloir supprimer ce critère ?</p>
            <p class=" ">Cette action est irréversible et supprimera définitivement le critère et ses associations.</p>
        </div>

        <div id="deleteErrorMessage" class="alert alert-danger rounded-xl mb-4 text-sm font-weight-bold" style="display: none;">
            <!-- Dynamic error message -->
        </div>
    </div>

    <div class="modal-footer border-top-0 px-4 pb-4 bg-light">
        <button type="button" class="btn btn-white  font-weight-bold rounded-pill px-4" data-dismiss="modal">Annuler</button>
        <button type="submit" class="btn btn-danger text-white font-weight-bold rounded-pill px-4 shadow-sm">
            <i data-lucide="trash-2" class="mr-2" ></i>
            Supprimer définitivement
        </button>
    </div>
</form>

<script>
    if (typeof lucide !== 'undefined') {
        lucide.createIcons();
    }
</script>
