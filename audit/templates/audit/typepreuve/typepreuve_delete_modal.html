{% load static %}

<div class="modal-header border-bottom">
    <h5 class="modal-title font-weight-bold">
        <i data-lucide="alert-triangle" class="mr-2 text-danger"></i>
        Confirmation de suppression
    </h5>
    <button type="button" class="close" data-dismiss="modal" aria-label="Close">
        <span aria-hidden="true">&times;</span>
    </button>
</div>

<div class="modal-body text-center py-4">
    <p>Souhaitez-vous vraiment supprimer le type de preuve suivant ?</p>
    <h5 class="font-weight-bold text-danger">{{ object.name }}</h5>
    <div id="deleteErrorMessage" class="alert alert-danger mt-3" style="display: none;"></div>
</div>

<div class="modal-footer">
    <form id="deleteForm" method="post" action="{% url 'typepreuve_delete' object.id %}" class="w-100 d-flex gap-2">
        {% csrf_token %}
        <button type="button" class="btn btn-secondary flex-fill" data-dismiss="modal">Annuler</button>
        <button type="submit" class="btn btn-danger flex-fill">
            <i data-lucide="trash-2" class="mr-2"></i>
            Supprimer
        </button>
    </form>
</div>

<script>
    if (typeof lucide !== 'undefined') { lucide.createIcons(); }
</script>
