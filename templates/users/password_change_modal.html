<div class="modal-content border-0 shadow-lg" style="border-radius: 15px; overflow: hidden;">
    <div class="modal-header bg-primary text-white">
        <h5 class="modal-title font-weight-bold">
            <i class="fas fa-key mr-2"></i> Modifier le mot de passe
        </h5>
        <button type="button" class="close text-white outline-none" data-dismiss="modal" aria-label="Close">
            <span aria-hidden="true">&times;</span>
        </button>
    </div>

    <form id="passwordChangeForm" method="post" action="{% url 'password_change' %}">
        {% csrf_token %}
        <div class="modal-body p-4">
            <div class="alert alert-info-soft mb-4 small">
                <i class="fas fa-info-circle mr-1"></i> Pour votre sécurité, votre nouveau mot de passe doit être différent du précédent.
            </div>

            {% for field in form %}
            <div class="form-group-premium mb-3">
                <label class="premium-label mb-1">{{ field.label }}</label>
                <div class="input-container-premium">
                    {{ field }}
                </div>
                {% if field.help_text %}
                <small class="form-text text-muted">{{ field.help_text|safe }}</small>
                {% endif %}
                {% if field.errors %}
                <div class="text-danger small mt-1 font-weight-bold">
                    {{ field.errors.0 }}
                </div>
                {% endif %}
            </div>
            {% endfor %}
        </div>
        <div class="modal-footer bg-light py-3 d-flex justify-content-between">
            <button type="button" class="btn btn-outline-secondary px-4 rounded-pill" data-dismiss="modal">Annuler</button>
            <button type="submit" class="btn btn-primary px-4 rounded-pill shadow-sm font-weight-bold">
                <i class="fas fa-save mr-2"></i> Mettre à jour
            </button>
        </div>
    </form>
</div>

<style>
    .premium-label {
        font-weight: 700;
        color: #4e73df;
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.05rem;
        display: block;
    }
    .input-container-premium input {
        display: block;
        width: 100%;
        padding: 0.6rem 0.75rem;
        font-size: 0.9rem;
        color: #6e707e;
        border: 1px solid #d1d3e2;
        border-radius: 6px;
        transition: all 0.2s ease;
        background-color: #f8f9fc;
    }
    .input-container-premium input:focus {
        background-color: #fff;
        border-color: #0061f2;
        box-shadow: 0 0 0 0.2rem rgba(0, 97, 242, 0.1);
        outline: none;
    }
    .alert-info-soft {
        background-color: #e3effd;
        color: #0061f2;
        border: none;
        border-radius: 6px;
        padding: 0.75rem;
    }
</style>

<script>
    if (window.lucide) {
        lucide.createIcons();
    }
</script>
